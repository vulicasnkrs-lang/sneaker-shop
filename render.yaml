services:
  # BACKEND (бот + API)
  - type: web
    name: vulica-snkrs-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        value: 8300602711:AAFRLntEhgV6Rep6six2vzge6_qY7DpK8og
      - key: ADMIN_CHAT_ID
        value: 1426577785
      - key: WEBAPP_URL
        value: https://www.vulica.store/index.html
      - key: BASE_URL
        value: https://www.vulica.store
      - key: PROMO_CODES
        value: NANOGI10:10,VULICA5:5

  # FRONTEND (WebApp)
  - type: static
    name: vulica-snkrs-webapp
    staticPublishPath: webapp
    buildCommand: ""
    autoDeploy: true

routes:
  # Rewrite для share/product
  - type: rewrite
    source: /share/product/(.*)
    destination: /share/product/$1.html
